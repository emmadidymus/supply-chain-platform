
version: "3.9"

services:

  db:

    image: postgres:16

    restart: always

    environment:

      POSTGRES_USER: scuser

      POSTGRES_PASSWORD: scpassword

      POSTGRES_DB: supplychain

    ports:

      - "5432:5432"

    volumes:

      - pgdata:/var/lib/postgresql/data

  backend:

    build: ./backend

    depends_on:

      - db

    ports:

      - "8000:8000"

    environment:

      DATABASE_URL: postgresql://scuser:scpassword@db:5432/supplychain

      SECRET_KEY: supersecretkey123

    volumes:

      - ./backend:/app

  frontend:

    build: ./frontend

    ports:

      - "5173:5173"

    volumes:

      - ./frontend:/app

volumes:

  pgdata:

